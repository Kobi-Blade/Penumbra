name: Build Penumbra

on:
  workflow_dispatch:
  
env:
  BUILD_CONFIGURATION: Release

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          submodules: recursive
          persist-credentials: false
          
      - name: Setup Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip -DestinationPath "$env:AppData/XIVLauncher/addon/Hooks/dev"
      
      - name: Publish Penumbra
        run: |
          cd Penumbra
          dotnet publish --configuration ${{ env.BUILD_CONFIGURATION }}
        
      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: ${{ github.sha }}
          path: ./Penumbra/bin/${{ env.BUILD_CONFIGURATION }}/publish
